# MyRoboTaxi iOS — XcodeGen spec (MYR-161).
# The .xcodeproj is NOT checked in; regenerate it any time with:
#   xcodegen generate
name: MyRoboTaxi

options:
  bundleIdPrefix: app.myrobotaxi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  DesignSystem:
    path: Packages/DesignSystem
  MyRoboTaxiKit:
    path: Packages/MyRoboTaxiKit
  # MYR-201 — the app's live telemetry adapter names generated contracts types
  # (`VehicleState`, `VehicleSummary`) directly, so it links the contracts
  # product explicitly (same version the Kit resolves — SPM dedupes).
  contracts:
    url: https://github.com/myrobotaxi/contracts.git
    from: 0.9.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  MyRoboTaxi:
    type: application
    platform: iOS
    sources:
      - App/Sources
    dependencies:
      - package: DesignSystem
      - package: MyRoboTaxiKit
      - package: contracts
        product: MyRobotaxiContracts
    # MYR-164 — Sign In with Apple capability. XcodeGen writes/owns this
    # entitlements file and sets CODE_SIGN_ENTITLEMENTS. The `Default`
    # authorization scope is the standard native-app value.
    entitlements:
      path: App/MyRoboTaxi.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.myrobotaxi.ios
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        # MYR-238 — wire the app icon; AppIcon.appiconset lives in
        # App/Sources/Assets.xcassets (single 1024x1024 universal entry).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        # MYR-211 — when-in-use location for the rider's live map + "Current
        # location" pickup (live mode only; sim never requests it).
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Shows where you are and sets your pickup point."
        TARGETED_DEVICE_FAMILY: "1"
        # MYR-164 — automatic signing + the paid team so a device build resolves a
        # managed profile carrying the Sign In with Apple entitlement. Simulator
        # builds do not require a provisioning profile (CODE_SIGNING_ALLOWED is NO
        # for the simulator SDK), so this never prompts for sim runs.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: NFKX777598

  # MYR-201 — app-side unit tests (adapter/contract mapping). Hosted by the app
  # target so `@testable import MyRoboTaxi` can reach the App-target types
  # (`Vehicle`, `VehicleTelemetrySnapshot`, `VehicleContractMapping`, the fleet).
  # Pure/no-network: contracts fixtures in, view models out.
  MyRoboTaxiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
    dependencies:
      - target: MyRoboTaxi
      - package: MyRoboTaxiKit
      - package: DesignSystem
      - package: contracts
        product: MyRobotaxiContracts
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.myrobotaxi.ios.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MyRoboTaxi.app/MyRoboTaxi"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  MyRoboTaxi:
    build:
      targets:
        MyRoboTaxi: all
    test:
      targets:
        - MyRoboTaxiTests
    run:
      config: Debug
