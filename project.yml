# MyRoboTaxi iOS — XcodeGen spec (MYR-161).
# The .xcodeproj is NOT checked in; regenerate it any time with:
#   xcodegen generate
name: MyRoboTaxi

options:
  bundleIdPrefix: app.myrobotaxi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  DesignSystem:
    path: Packages/DesignSystem
  MyRoboTaxiKit:
    path: Packages/MyRoboTaxiKit
  # MYR-201 — the app's live telemetry adapter names generated contracts types
  # (`VehicleState`, `VehicleSummary`) directly, so it links the contracts
  # product explicitly (same version the Kit resolves — SPM dedupes).
  contracts:
    url: https://github.com/myrobotaxi/contracts.git
    from: 0.9.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  MyRoboTaxi:
    type: application
    platform: iOS
    sources:
      - App/Sources
    dependencies:
      - package: DesignSystem
      - package: MyRoboTaxiKit
      - package: contracts
        product: MyRobotaxiContracts
    # MYR-164 — Sign In with Apple capability. XcodeGen writes/owns this
    # entitlements file and sets CODE_SIGN_ENTITLEMENTS. The `Default`
    # authorization scope is the standard native-app value.
    entitlements:
      path: App/MyRoboTaxi.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.myrobotaxi.ios
        # MYR-247 — first TestFlight release is 1.0.0. MARKETING_VERSION is the
        # public version string (CFBundleShortVersionString). CURRENT_PROJECT_VERSION
        # is the build number (CFBundleVersion): it MUST be unique+monotonic per
        # upload to App Store Connect. Keep "1" as the committed baseline and
        # override it at archive time (RELEASING.md):
        #   xcodebuild ... CURRENT_PROJECT_VERSION=$BUILD_NUMBER archive
        # so re-uploads without a version bump don't collide.
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        # MYR-238 — wire the app icon; AppIcon.appiconset lives in
        # App/Sources/Assets.xcassets (single 1024x1024 universal entry).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        # MYR-247 — export compliance. The app uses only standard HTTPS/TLS
        # (exempt encryption), so declare it up front to skip the manual
        # "missing compliance" prompt on every TestFlight build.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        # MYR-211 — when-in-use location for the rider's live map + "Current
        # location" pickup (live mode only; sim never requests it).
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Shows where you are and sets your pickup point."
        TARGETED_DEVICE_FAMILY: "1"
        # MYR-164 — automatic signing + the paid team so a device build resolves a
        # managed profile carrying the Sign In with Apple entitlement. Simulator
        # builds do not require a provisioning profile (CODE_SIGNING_ALLOWED is NO
        # for the simulator SDK), so this never prompts for sim runs.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: NFKX777598

  # MYR-201 — app-side unit tests (adapter/contract mapping). Hosted by the app
  # target so `@testable import MyRoboTaxi` can reach the App-target types
  # (`Vehicle`, `VehicleTelemetrySnapshot`, `VehicleContractMapping`, the fleet).
  # Pure/no-network: contracts fixtures in, view models out.
  MyRoboTaxiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
    dependencies:
      - target: MyRoboTaxi
      - package: MyRoboTaxiKit
      - package: DesignSystem
      - package: contracts
        product: MyRobotaxiContracts
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.myrobotaxi.ios.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MyRoboTaxi.app/MyRoboTaxi"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # MYR-236 round 2 — the sheet-feel measurement harness. A UI-test target
  # (distinct from the unit-test target above, which can't synthesize touches)
  # boots the `ownerHome` scene, performs a slow drag + fast flicks on the
  # draggable detent sheet, and asserts it tracks / crosses detents. The app
  # emits a per-frame (requested, rendered) height trace under
  # `MRT_SHEET_TRACE=1` that the CI step parses into an objective tracking-error
  # number for the PR body.
  MyRoboTaxiUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - App/UITests
    dependencies:
      - target: MyRoboTaxi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.myrobotaxi.ios.uitests
        TEST_TARGET_NAME: MyRoboTaxi

schemes:
  MyRoboTaxi:
    build:
      targets:
        MyRoboTaxi: all
    test:
      targets:
        - MyRoboTaxiTests
        - MyRoboTaxiUITests
    run:
      config: Debug
