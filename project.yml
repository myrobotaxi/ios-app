# MyRoboTaxi iOS — XcodeGen spec (MYR-161).
# The .xcodeproj is NOT checked in; regenerate it any time with:
#   xcodegen generate
name: MyRoboTaxi

options:
  bundleIdPrefix: app.myrobotaxi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  DesignSystem:
    path: Packages/DesignSystem
  MyRoboTaxiKit:
    path: Packages/MyRoboTaxiKit
  # MYR-201 — the app's live telemetry adapter names generated contracts types
  # (`VehicleState`, `VehicleSummary`) directly, so it links the contracts
  # product explicitly (same version the Kit resolves — SPM dedupes).
  contracts:
    url: https://github.com/myrobotaxi/contracts.git
    from: 0.5.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  MyRoboTaxi:
    type: application
    platform: iOS
    sources:
      - App/Sources
    dependencies:
      - package: DesignSystem
      - package: MyRoboTaxiKit
      - package: contracts
        product: MyRobotaxiContracts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.myrobotaxi.ios
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic

  # MYR-201 — app-side unit tests (adapter/contract mapping). Hosted by the app
  # target so `@testable import MyRoboTaxi` can reach the App-target types
  # (`Vehicle`, `VehicleTelemetrySnapshot`, `VehicleContractMapping`, the fleet).
  # Pure/no-network: contracts fixtures in, view models out.
  MyRoboTaxiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
    dependencies:
      - target: MyRoboTaxi
      - package: MyRoboTaxiKit
      - package: DesignSystem
      - package: contracts
        product: MyRobotaxiContracts
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.myrobotaxi.ios.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MyRoboTaxi.app/MyRoboTaxi"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  MyRoboTaxi:
    build:
      targets:
        MyRoboTaxi: all
    test:
      targets:
        - MyRoboTaxiTests
    run:
      config: Debug
